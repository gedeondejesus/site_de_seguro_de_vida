{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Heller Finance{% endblock %}</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Seu CSS -->
  <link rel="stylesheet" href="{% static 'website/css/style.css' %}">

  {% block extra_head %}{% endblock %}
</head>

<body class="site-bg">

  <!-- NAV -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-premium">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <img src="{% static 'website/img/logo.png' %}" alt="Heller Finance" class="nav-logo">
        <span class="fw-bold"></span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/about/">About</a></li>
          <li class="nav-item"><a class="nav-link" href="/plans/">Plans</a></li>
          <li class="nav-item"><a class="nav-link" href="/contact/">Contact</a></li>
          <li class="nav-item ms-lg-2">
            <a class="btn btn-gold" href="/quote/">Get a Quote</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- PAGE WRAP -->
  <main class="page-wrap">
    {% block content %}{% endblock %}
  </main>

  <!-- FOOTER -->
  {% include "website/partials/footer.html" %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
